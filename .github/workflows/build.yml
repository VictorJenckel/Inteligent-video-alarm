name: Build Windows EXE

on:
  push:
    branches: [ main ] # Roda automaticamente quando você envia código para a main
  workflow_dispatch:   # Cria um botão para você rodar manualmente quando quiser

jobs:
  build:
    runs-on: windows-latest # Usa uma máquina Windows do GitHub

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Versão estável do Python

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller opencv-python numpy mss pywin32

    - name: Compilar com PyInstaller
      # O --noconsole esconde a tela preta do terminal do Windows
      run: |
        pyinstaller --onefile --noconsole overlay_alarm_v3.py

    - name: Fazer upload do executável
      uses: actions/upload-artifact@v4
      with:
        name: OverlayAlarm-EXE
        path: dist/overlay_alarm_v3.exe
